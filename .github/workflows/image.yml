name: image

# Build and publish the audiosilo-sidecars daemon container images to GHCR on a
# v* tag push and on manual dispatch. Two variants are built from ONE Dockerfile
# (via multi-stage `--target`, so the shared web/go build stages run once each):
#   - `default` (target runtime)       -> ghcr.io/kodestar/audiosilo-sidecars:<tag>, :latest
#   - `cuda`    (target runtime-cuda)  -> ghcr.io/kodestar/audiosilo-sidecars:<tag>-cuda, :latest-cuda
# The `-cuda` suffix is produced by the metadata-action `suffix` flavor below.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege: read the code, write packages (the images).
permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            target: runtime
            suffix: ""
          - variant: cuda
            target: runtime-cuda
            suffix: "-cuda"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kodestar/audiosilo-sidecars
          # suffix appends `-cuda` to every tag for the cuda variant (and nothing
          # for the default variant).
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          # Both legs are amd64 only: the nvidia/cuda base is amd64-only, and
          # matching the CPU leg keeps this simple. A multi-arch/arm64 image is a
          # follow-up.
          platforms: linux/amd64
          # The version stamp: the tag name on a tag push (metadata-action's
          # version output), else a commit-traceable dev marker.
          build-args: |
            VERSION=${{ startsWith(github.ref, 'refs/tags/') && steps.meta.outputs.version || format('dev-{0}', github.sha) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-variant gha cache so the two legs don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
